name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build src/Plumix.Packages.slnx -c Release

  # ─── Pack & Publish (tags only) ────────────────────────────────────────────
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack
        run: |
          dotnet pack src/Plumix.Provider/Plumix.Provider.csproj -c Release -p:Version=$PKG_VERSION
          dotnet pack src/Plumix.Bloc/Plumix.Bloc.csproj         -c Release -p:Version=$PKG_VERSION

      - name: Push to NuGet.org
        run: |
          for pkg in \
            src/Plumix.Provider/bin/Release/Plumix.Provider.${PKG_VERSION}.nupkg \
            src/Plumix.Bloc/bin/Release/Plumix.Bloc.${PKG_VERSION}.nupkg; do
            if [ -f "$pkg" ]; then
              dotnet nuget push "$pkg" \
                --api-key ${{ secrets.NUGET_API_KEY }} \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done
